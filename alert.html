<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 360px;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: transparent;
      display: flex;
      flex-direction: column;
    }
    body { animation: magneticSnap .55s cubic-bezier(.34, 1.56, .64, 1); }
    /* 磁性吸附：偏右进入 → 越过目标 → 弹回稳定，仿 magnet snap */
    @keyframes magneticSnap {
      0%   { transform: translateX(50px);  opacity: 0; }
      45%  { transform: translateX(-10px); opacity: 1; }
      70%  { transform: translateX(4px); }
      100% { transform: translateX(0);    opacity: 1; }
    }
    /* 雪球品牌蓝 */
    .hd {
      background: #1E6FFF;
      color: #fff;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      border-radius: 14px 14px 0 0;
    }
    .hd .total { font-size: 12px; opacity: .9; }
    .hd button {
      background: rgba(255,255,255,.22);
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 3px 12px;
      cursor: pointer;
      font-size: 12px;
      transition: background .15s;
    }
    .hd button:hover { background: rgba(255,255,255,.35); }
    .list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #fff;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,.12) transparent;
    }
    .list::-webkit-scrollbar { width: 4px; }
    .list::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 2px; }
    .card {
      background: #fff;
      border: 0.5px solid #EBEBEF;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: box-shadow .15s, transform .12s, opacity .3s, max-height .3s, margin .3s, padding .3s;
      position: relative;
      display: flex;
      gap: 11px;
      align-items: flex-start;
      max-height: 120px;
      overflow: hidden;
    }
    .card:hover { box-shadow: 0 3px 12px rgba(30,111,255,.12); transform: translateY(-1px); border-color: #C9DCFF; }
    /* 已读：向右滑出 + 收起 */
    .card.read {
      opacity: 0;
      transform: translateX(60px);
      max-height: 0;
      margin-bottom: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-width: 0;
      pointer-events: none;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 500; flex-shrink: 0; position: relative;
    }
    .badge {
      position: absolute; top: -5px; right: -5px;
      min-width: 18px; height: 18px; padding: 0 5px;
      background: #1E6FFF; color: #fff; border-radius: 9px;
      font-size: 11px; font-weight: 500; line-height: 18px; text-align: center;
      border: 2px solid #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .body { flex: 1; min-width: 0; }
    .row1 { display: flex; align-items: baseline; gap: 7px; margin-bottom: 3px; }
    .name { font-size: 14px; font-weight: 500; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .time { font-size: 11px; color: #999; flex-shrink: 0; margin-left: auto; }
    .txt { font-size: 13px; color: #666; line-height: 1.45; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .readhint { font-size: 11px; color: #1E6FFF; margin-top: 4px; opacity: 0; transition: opacity .15s; }
    .card:hover .readhint { opacity: 1; }
    .empty {
      color: #999; font-size: 13px; text-align: center; padding: 40px 16px;
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    .ft {
      font-size: 11px; color: #AAA; text-align: center; padding: 8px 0;
      flex-shrink: 0; border-top: 0.5px solid #F0F0F2; background: #FAFAFC;
      border-radius: 0 0 14px 14px;
    }
  </style>
</head>
<body>
  <div class="hd">
    <span>❄ 特别关注</span>
    <span class="total" id="total"></span>
    <div style="display:flex;gap:6px;align-items:center;">
      <button id="markAll">全部已读</button>
      <button id="close">关闭</button>
    </div>
  </div>
  <div class="list" id="list"></div>
  <div class="ft">点击卡片打开并标记已读 · 全部读完自动关闭 · 3分钟未读完会再提醒</div>
  <script src="alert.js"></script>
</body>
</html>

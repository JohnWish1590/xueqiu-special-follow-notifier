<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; font-family: -apple-system, "Microsoft YaHei", sans-serif; padding: 14px; margin: 0; color: #222; }
    h2 { font-size: 15px; margin: 0 0 10px; }
    .row { font-size: 12px; color: #555; margin: 4px 0; }
    .row b { color: #111; }
    button { width: 100%; padding: 8px; margin-top: 10px; border: none; border-radius: 6px;
             background: #e6162d; color: #fff; font-size: 13px; cursor: pointer; }
    button:active { opacity: .85; }
    .sep { height: 1px; background: #eee; margin: 10px 0; }
    .post { font-size: 12px; padding: 6px 8px; background: #fafafa; border-radius: 6px; margin: 6px 0; }
    .post .name { color: #e6162d; font-weight: 600; }
    .post .t { color: #888; font-size: 11px; }
    .post .txt { color: #333; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .empty { font-size: 12px; color: #999; }
    a { color: #e6162d; font-size: 12px; text-decoration: none; }
  </style>
</head>
<body>
  <h2>🔥 雪球特别关注 新帖提醒</h2>
  <div class="row">监控博主：<b id="cnt">—</b> 人</div>
  <div class="row">上次运行：<b id="last">—</b></div>
  <div class="row">未读新帖：<b id="unread" style="color:#1E6FFF;">0</b> 条</div>
  <div class="row" id="errrow" style="display:none;color:#c00;margin-top:4px;">⚠️ 上次检查出错：<span id="err"></span></div>
  <div class="row" id="diag" style="font-size:11px;color:#777;margin-top:4px;"></div>
  <div class="sep"></div>
  <div id="recent"></div>
  <button id="open-alert" style="background:#1E6FFF;">🔔 唤出提醒窗口</button>
  <button id="check">立即检查一次</button>
  <div class="sep"></div>
  <a href="#" id="options">⚙️ 设置（轮询间隔 / 兜底名单）</a>

  <script src="popup.js"></script>
</body>
</html>
